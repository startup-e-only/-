<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Segoe UI,system-ui,sans-serif;background:#0a0e1a;color:#e0e0e0;padding:20px;display:flex;justify-content:center;min-height:100vh;}
        .container{max-width:700px;width:100%;background:rgba(255,255,255,0.03);border-radius:24px;padding:30px;border:1px solid rgba(255,255,255,0.06);}
        h1{color:#00ff88;font-size:24px;margin-bottom:8px;}
        .subtitle{color:#888;font-size:14px;margin-bottom:20px;}
        textarea{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);color:#e0e0e0;font-size:14px;resize:vertical;min-height:100px;font-family:inherit;outline:none;}
        textarea:focus{border-color:#00ff88;}
        button{padding:10px 28px;border-radius:40px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;background:#00ff88;color:#0a0e1a;margin-top:12px;}
        button:hover{box-shadow:0 0 30px rgba(0,255,136,0.15);transform:scale(1.02);}
        button:active{transform:scale(0.97);}
        button.danger{background:transparent;border:1px solid #ff6b6b;color:#ff6b6b;margin-left:10px;}
        #response{margin-top:16px;padding:16px;border-radius:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.04);min-height:60px;white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.6;display:none;}
        #response.show{display:block;}
        #response .label{color:#888;font-size:12px;margin-bottom:8px;}
        #response .content{color:#ddd;}
        #response .error{color:#ff6b6b;}
        #response .success{color:#00ff88;}
        .status{margin-top:12px;padding:8px 16px;border-radius:12px;font-size:14px;background:rgba(255,255,255,0.03);}
        .loader{display:none;margin-top:12px;color:#ffd93d;animation:pulse 1s ease-in-out infinite;}
        .loader.show{display:block;}
        @keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
        .stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;font-size:13px;color:#666;}
        .stats span{color:#eee;font-weight:600;}
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Ermak X AI</h1>
    <div class="subtitle">Чат с искусственным интеллектом</div>
    <textarea id="messageInput" placeholder="Введите сообщение...">Привет! Расскажи кратко о нейросетях.</textarea>
    <div>
        <button id="sendBtn">🚀 Отправить</button>
        <button class="danger" id="clearBtn">🗑 Очистить</button>
    </div>
    <div class="status" id="status">● Готов к работе</div>
    <div class="loader" id="loader">⏳ AI думает...</div>
    <div id="response">
        <div class="label">📩 Ответ AI</div>
        <div class="content" id="responseContent"></div>
    </div>
    <div class="stats">
        <div>📊 Размер запроса: <span id="reqSize">0</span> симв.</div>
        <div>📥 Размер ответа: <span id="respSize">0</span> симв.</div>
        <div>⏱ Время: <span id="respTime">0</span> мс</div>
    </div>
</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO5X2HV3AZj4vmuZXoKyUTbifL3rFpS0WKla7hBZx6b7XMf2sNNlYfB-LoPI_aPzHQ/exec';
    
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const loader = document.getElementById('loader');
    const responseDiv = document.getElementById('response');
    const responseContent = document.getElementById('responseContent');
    const reqSize = document.getElementById('reqSize');
    const respSize = document.getElementById('respSize');
    const respTime = document.getElementById('respTime');

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) {
            statusDiv.textContent = '⚠️ Введите текст';
            statusDiv.style.color = '#ffd93d';
            return;
        }

        const startTime = performance.now();
        const msgLen = message.length;
        reqSize.textContent = msgLen;

        statusDiv.textContent = '⏳ Отправка...';
        statusDiv.style.color = '#ffd93d';
        loader.classList.add('show');
        responseDiv.classList.remove('show');
        sendBtn.disabled = true;
        sendBtn.textContent = '⏳ ...';

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'sendToAI',
                    agent: 'Ermak X',
                    message: message,
                    timestamp: new Date().toISOString()
                })
            });

            const endTime = performance.now();
            const elapsed = Math.round(endTime - startTime);
            respTime.textContent = elapsed;

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();

            if (data.success) {
                const reply = data.response || '✅ Успешно, но ответ пустой';
                const replyLen = reply.length;
                respSize.textContent = replyLen;

                responseContent.textContent = reply;
                responseContent.className = 'content success';
                responseDiv.classList.add('show');

                statusDiv.textContent = `✅ Готово (${elapsed} мс)`;
                statusDiv.style.color = '#00ff88';
            } else {
                const errorMsg = data.error || 'Неизвестная ошибка';
                responseContent.textContent = '❌ ' + errorMsg;
                responseContent.className = 'content error';
                responseDiv.classList.add('show');
                statusDiv.textContent = '❌ Ошибка';
                statusDiv.style.color = '#ff6b6b';
            }
        } catch (error) {
            const endTime = performance.now();
            const elapsed = Math.round(endTime - startTime);
            respTime.textContent = elapsed;
            responseContent.textContent = '❌ Ошибка: ' + error.message;
            responseContent.className = 'content error';
            responseDiv.classList.add('show');
            statusDiv.textContent = '❌ ' + error.message;
            statusDiv.style.color = '#ff6b6b';
        }

        loader.classList.remove('show');
        sendBtn.disabled = false;
        sendBtn.textContent = '🚀 Отправить';
    }

    function clearAll() {
        responseDiv.classList.remove('show');
        statusDiv.textContent = '● Готов к работе';
        statusDiv.style.color = '#888';
        respSize.textContent = '0';
        respTime.textContent = '0';
        messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearAll);

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    console.log('✅ Ermak X AI готов к работе');
    console.log('🔗 SCRIPT_URL:', SCRIPT_URL);
</script>
</body>
</html>
