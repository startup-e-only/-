<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>AI Ассистент</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.2s, color 0.2s;
            overflow: hidden;
        }

        body.theme-light {
            --bg-color: #f5f5f7;
            --text-color: #1c1c1e;
            --ai-msg-bg: transparent;
            --user-msg-color: #00AE00;
            --border-color: rgba(0, 0, 0, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --accent: #00AE00;
            --input-border: rgba(0, 0, 0, 0.1);
            --user-text: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --code-bg: rgba(0, 0, 0, 0.05);
            --code-border: rgba(0, 0, 0, 0.1);
            --table-border: #d0d7de;
            --table-header-bg: #f6f8fa;
            --blockquote-border: #00AE00;
            --blockquote-bg: rgba(0, 174, 0, 0.05);
            --svg-border: #00AE00;
            --btn-disabled: rgba(0, 0, 0, 0.2);
        }
        body.theme-dark {
            --bg-color: #000000;
            --text-color: #e4e4e7;
            --ai-msg-bg: transparent;
            --user-msg-color: #00AE00;
            --border-color: rgba(255, 255, 255, 0.25);
            --glass-bg: rgba(30, 30, 35, 0.7);
            --accent: #00AE00;
            --input-border: rgba(255, 255, 255, 0.15);
            --user-text: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --code-bg: rgba(255, 255, 255, 0.05);
            --code-border: rgba(255, 255, 255, 0.1);
            --table-border: #30363d;
            --table-header-bg: #21262d;
            --blockquote-border: #00AE00;
            --blockquote-bg: rgba(0, 174, 0, 0.08);
            --svg-border: #00AE00;
            --btn-disabled: rgba(255, 255, 255, 0.2);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
        }

        .top-buttons {
            position: fixed;
            top: 12px;
            left: 0;
            right: 0;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            z-index: 2000;
            pointer-events: none;
        }
        .top-buttons>* {
            pointer-events: auto;
        }

        .close-red {
            width: 14px;
            height: 14px;
            background: #ff5f5a;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            margin-top: 4px;
        }

        .clear-btn {
            width: 36px;
            height: 36px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-color);
            transition: transform 0.15s;
            box-shadow: 0 2px 12px var(--shadow-color);
            flex-shrink: 0;
        }
        .clear-btn:active {
            transform: scale(0.9);
        }

        .agent-selector {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            pointer-events: none;
        }
        .agent-selector>* {
            pointer-events: auto;
        }

        .agent-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            box-shadow: 0 2px 12px var(--shadow-color);
            white-space: nowrap;
            max-width: 200px;
        }
        .agent-btn span:last-child {
            font-size: 10px;
        }
        .agent-btn:active {
            transform: scale(0.97);
        }

        .agent-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 8px 0;
            min-width: 200px;
            max-width: 280px;
            display: none;
            flex-direction: column;
            z-index: 200;
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .agent-dropdown.show {
            display: flex;
        }

        .agent-option {
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            border-radius: 12px;
            margin: 2px 6px;
            transition: background 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .agent-option:active {
            background: rgba(0, 174, 0, 0.1);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 70px 12px 8px 12px;
            min-height: 0;
            width: 100%;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .message {
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
            width: 100%;
        }
        .message-user {
            align-self: flex-end;
            background: var(--user-msg-color);
            color: var(--user-text);
            border-bottom-right-radius: 6px;
            max-width: 85%;
            width: auto;
        }
        .message-ai {
            align-self: flex-start;
            background: transparent;
            color: var(--text-color);
            border: none;
            border-radius: 0;
            width: 100%;
            max-width: 100%;
            padding: 4px 0;
        }
        .message-ai .content {
            white-space: normal;
            overflow-wrap: break-word;
            width: 100%;
        }

        .message-ai .content .svg-image {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 12px 0;
            padding: 8px;
            border: 2px solid var(--svg-border);
            border-radius: 8px;
            background: var(--bg-color);
            box-shadow: 0 2px 12px var(--shadow-color);
            cursor: context-menu;
        }

        .message-ai .content .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid var(--table-border);
            width: 100%;
            max-width: 100%;
            display: block;
        }
        .message-ai .content .table-wrapper table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.95em;
            margin: 0;
        }
        .message-ai .content .table-wrapper table th,
        .message-ai .content .table-wrapper table td {
            border: none;
            border-bottom: 1px solid var(--table-border);
            padding: 8px 16px;
            text-align: left;
            white-space: nowrap;
            min-width: 80px;
            background: var(--bg-color);
        }
        .message-ai .content .table-wrapper table th {
            background: var(--table-header-bg);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 2px solid var(--table-border);
        }
        .message-ai .content .table-wrapper table tr:nth-child(even) td {
            background: var(--code-bg);
        }
        .message-ai .content .table-wrapper table tr:hover td {
            background: var(--table-header-bg);
        }
        .message-ai .content .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }
        .message-ai .content .table-wrapper::-webkit-scrollbar-track {
            background: var(--code-bg);
            border-radius: 4px;
        }
        .message-ai .content .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        .message-ai .content .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--border-color);
        }

        .message-ai .content h1,
        .message-ai .content h2,
        .message-ai .content h3,
        .message-ai .content h4,
        .message-ai .content h5,
        .message-ai .content h6 {
            margin: 16px 0 8px 0;
            font-weight: 600;
            line-height: 1.3;
        }
        .message-ai .content h1 {
            font-size: 1.6em;
        }
        .message-ai .content h2 {
            font-size: 1.4em;
        }
        .message-ai .content h3 {
            font-size: 1.2em;
        }
        .message-ai .content h4 {
            font-size: 1.1em;
        }
        .message-ai .content h5 {
            font-size: 1.0em;
        }
        .message-ai .content h6 {
            font-size: 0.9em;
            color: var(--text-color);
            opacity: 0.7;
        }
        .message-ai .content p {
            margin: 8px 0;
        }
        .message-ai .content ul,
        .message-ai .content ol {
            margin: 8px 0 8px 24px;
            padding-left: 8px;
        }
        .message-ai .content ul {
            list-style-type: disc;
        }
        .message-ai .content ol {
            list-style-type: decimal;
        }
        .message-ai .content li {
            margin: 4px 0;
        }
        .message-ai .content blockquote {
            margin: 12px 0;
            padding: 8px 16px;
            border-left: 4px solid var(--blockquote-border);
            background: var(--blockquote-bg);
            border-radius: 0 8px 8px 0;
            color: var(--text-color);
            opacity: 0.85;
        }
        .message-ai .content blockquote p {
            margin: 4px 0;
        }
        .message-ai .content code {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            font-size: 0.9em;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--code-border);
            color: var(--text-color);
        }
        .message-ai .content pre {
            margin: 12px 0;
            padding: 16px;
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 12px;
            overflow-x: auto;
            position: relative;
        }
        .message-ai .content pre code {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.6;
            white-space: pre;
            word-break: normal;
            color: var(--text-color);
        }
        .message-ai .content hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 16px 0;
        }
        .message-ai .content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent);
        }
        .message-ai .content a:hover {
            border-bottom: 1px solid var(--accent);
        }
        .message-ai .content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }
        .message-ai .content strong {
            font-weight: 700;
        }
        .message-ai .content em {
            font-style: italic;
        }
        .message-ai .content del {
            text-decoration: line-through;
        }

        .message-ai .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .loading-bubble {
            align-self: flex-start;
            max-width: 85%;
            padding: 16px 24px;
            border-radius: 100px 100px 100px 16px;
            background: var(--ai-msg-bg);
            border: 2px solid transparent;
            position: relative;
            margin: 4px 0;
            animation: bubblePulse 1.5s ease-in-out infinite;
            display: none;
            background: rgba(0, 174, 0, 0.08) !important;
        }
        .loading-bubble.show {
            display: block;
        }
        @keyframes bubblePulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.02);
                opacity: 0.9;
            }
        }
        .loading-bubble .loader-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .loading-bubble .loader-dots {
            display: flex;
            gap: 4px;
        }
        .loading-bubble .loader-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .loading-bubble .loader-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-bubble .loader-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dotBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--input-border);
            border-radius: 32px;
            padding: 6px 6px 6px 14px;
            gap: 6px;
            margin: 4px 12px 4px 12px;
            position: relative;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: var(--text-color);
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            padding: 8px 0;
            user-select: text;
            -webkit-user-select: text;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
            opacity: 0.4;
            pointer-events: none;
            padding: 0;
            position: relative;
        }
        .send-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .send-btn:active {
            transform: scale(0.9);
        }

        .send-btn.stop-btn {
            background: var(--accent);
            opacity: 1;
            pointer-events: auto;
        }
        .send-btn.stop-btn::after {
            content: '';
            display: block;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .send-btn.stop-btn .arrow-icon {
            display: none;
        }
        .send-btn .arrow-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .char-counter {
            font-size: 11px;
            color: var(--text-color);
            opacity: 0.3;
            padding: 4px 8px;
            flex-shrink: 0;
            font-family: monospace;
            transition: opacity 0.2s;
        }
        .char-counter.warning {
            opacity: 0.7;
            color: #ff5f5a;
        }

        .copyright {
            text-align: center;
            font-size: 10px;
            color: rgba(128, 128, 128, 0.6);
            margin-top: 4px;
            pointer-events: none;
            flex-shrink: 0;
            padding-bottom: 4px;
        }

        .scroll-to-bottom {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            font-size: 18px;
            transition: opacity 0.25s, transform 0.15s;
            opacity: 0.6;
        }
        .scroll-to-bottom.show {
            display: flex;
            opacity: 0.6;
            pointer-events: auto;
        }
        .scroll-to-bottom:hover {
            opacity: 0.85;
        }
        .scroll-to-bottom:active {
            transform: translateX(-50%) scale(0.92);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 3000;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .context-menu {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 180px;
            z-index: 5000;
            display: none;
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .context-menu.show {
            display: block;
        }
        .context-menu .item {
            padding: 10px 20px;
            font-size: 14px;
            color: var(--text-color);
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu .item:active {
            background: rgba(0, 174, 0, 0.1);
        }
        .context-menu .divider {
            display: none;
        }

        @keyframes particleExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: particleExplode 0.8s ease-out forwards;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px 24px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px var(--shadow-color);
        }
        .modal-box h3 {
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 20px;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-box .modal-actions button {
            padding: 10px 28px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s;
            backdrop-filter: blur(8px);
        }
        .modal-box .modal-actions button:active {
            transform: scale(0.95);
        }
        .modal-box .modal-actions .btn-danger {
            border-color: #ff5f5a;
            color: #ff5f5a;
        }
        .modal-box .modal-actions .btn-danger:active {
            background: rgba(255, 95, 90, 0.15);
        }

        @media (max-width: 480px) {
            .message {
                max-width: 100%;
                font-size: 14px;
                padding: 10px 14px;
            }
            .agent-btn {
                font-size: 12px;
                padding: 4px 12px;
                max-width: 150px;
            }
            .chat-area {
                padding: 60px 8px 8px 8px;
            }
            .message-ai {
                padding: 4px 0;
            }
            .message-ai .content pre {
                padding: 12px;
                font-size: 0.8em;
            }
            .message-ai .content .table-wrapper table {
                font-size: 0.85em;
            }
            .message-ai .content .table-wrapper table th,
            .message-ai .content .table-wrapper table td {
                padding: 6px 12px;
                min-width: 60px;
            }
            .clear-btn {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .message-ai .content .svg-image {
                max-width: 100%;
                max-height: 50vh;
            }
            .modal-box {
                padding: 24px 16px 20px;
            }
            .top-buttons {
                top: 8px;
                padding: 0 12px;
            }
            .input-wrapper {
                margin: 4px 8px 4px 8px;
                padding: 6px 6px 6px 12px;
            }
            .send-btn {
                width: 34px;
                height: 34px;
                min-width: 34px;
                font-size: 18px;
            }
            .send-btn.stop-btn::after {
                width: 12px;
                height: 12px;
            }
            .scroll-to-bottom {
                bottom: 90px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .char-counter {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-buttons">
            <div class="close-red" id="closeBtn"></div>
            <button class="clear-btn" id="clearBtn" title="Очистить историю">🗑</button>
        </div>

    <script>

        function checkMobile() {

                window.innerWidth < 768;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 2500);
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.pointerEvents = 'none';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Скопировано');
            } catch (_) {
                showToast('Не удалось скопировать');

            document.body.removeChild(textarea);

        function convertSvgToImages(html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            const codeBlocks = tempDiv.querySelectorAll('pre code');
            codeBlocks.forEach(codeEl => {
                const text = codeEl.textContent || '';
                const trimmed = text.trim();
                if (trimmed.startsWith('<svg') || trimmed.includes('<svg')) {
                    try {
                        const svgData = new Blob([trimmed], { type: 'image/svg+xml;charset=utf-8' });
                        const url = URL.createObjectURL(svgData);
                        const img = document.createElement('img');
                        img.src = url;
                        img.className = 'svg-image';
                        img.alt = 'SVG изображение';
                        img.loading = 'eager';
                        const pre = codeEl.closest('pre');
                        if (pre) {
                            img.onload = () => URL.revokeObjectURL(url);
                            img.onerror = () => { URL.revokeObjectURL(url); };
                            pre.replaceWith(img);
                        }
                    } catch (_) { /* ignore */ }
                }
            });
            return tempDiv.innerHTML;
        }

        function parseFullMarkdown(text) {
            if (typeof text !== 'string') return text;
            try {
                let result = text;
                result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                result = result.replace(/\*(.*?)\*/g, '<em>$1</em>');
                result = result.replace(/~~(.*?)~~/g, '<del>$1</del>');
                result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
                result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
                return result;
            } catch (_) {
                return escapeHtml(text);
            }
        }

        function parseMarkdownTables(text) {
            if (typeof text !== 'string') return text;
            const lines = text.split('\n');
            let result = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
                    let headerLine = line;
                    let dataLines = [];
                    if (i + 1 < lines.length && /^\s*\|[\s\-:|]+\|\s*$/.test(lines[i + 1].trim())) {
                        i += 2;
                        while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|') &&
                            !/^\s*\|[\s\-:|]+\|\s*$/.test(lines[i].trim())) {
                            dataLines.push(lines[i]);
                            i++;
                        }
                    } else {
                        result.push(line);
                        i++;
                        continue;
                    }
                    const headerCells = headerLine.split('|').filter(c => c.trim() !== '').map(c => c.trim());
                    const rows = dataLines.map(row => row.split('|').filter(c => c.trim() !== '').map(c => c.trim()));

                    let tableHtml = '<div class="table-wrapper"><table>';
                    tableHtml += '<thead><tr>';
                    headerCells.forEach(cell => { tableHtml += `<th>${parseFullMarkdown(cell)}</th>`; });
                    tableHtml += '</tr></thead>';
                    tableHtml += '<tbody>';
                    rows.forEach(row => {
                        tableHtml += '<tr>';
                        for (let j = 0; j < headerCells.length; j++) {
                            tableHtml += `<td>${parseFullMarkdown(row[j] || '')}</td>`;
                        }
                        tableHtml += '</tr>';
                    });
                    tableHtml += '</tbody></table></div>';
                    result.push(tableHtml);
                    continue;
                }
                if (line.trim() !== '') {
                    try { result.push(marked.parse(line)); } catch (_) { result.push(escapeHtml(line)); }
                } else {
                    result.push('<br>');
                }
                i++;
            }
            return result.join('');
        }

        function parseMarkdown(text) {
            try {
                let html;
                if (text.includes('|')) {
                    html = parseMarkdownTables(text);
                } else {
                    html = marked.parse(text);
                }
                return convertSvgToImages(html);
            } catch (_) {
                return escapeHtml(text);
            }
        }

        function applyTheme(theme) {
            let resolved = theme;
            if (theme === 'system') {
                resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(`theme-${resolved}`);
        }

        function loadAppSettings() {
            const saved = localStorage.getItem('ermakx_settings');
            if (saved) {
                try { applyTheme(JSON.parse(saved).theme || 'system'); } catch (_) { applyTheme('system'); }
            } else {
                applyTheme('system');
            }
        }

        function loadUserData() {
            try {
                const data = localStorage.getItem('ermakx_user');
                userData = data ? JSON.parse(data) : null;
            } catch (_) { userData = null; }
        }

        function getUserPrompt() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            let prompt = `Текущая дата и время: ${dateStr} ${timeStr}\n`;
            if (!userData) return prompt;
            if (userData.display_name || userData.real_name) {
                prompt += `Имя: ${userData.display_name || userData.real_name}\n`;
            }
            if (userData.login) prompt += `Логин: ${userData.login}\n`;
            if (userData.default_email) prompt += `Email: ${userData.default_email}\n`;
            if (userData.default_phone) {
                const phone = typeof userData.default_phone === 'object' ? userData.default_phone.number : userData
                    .default_phone;
                prompt += `Телефон: ${phone}\n`;
            }
            if (userData.birthday) {
                const d = new Date(userData.birthday);
                prompt +=
                    `Дата рождения: ${d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })}\n`;
            }
            if (userData.sex) {
                const gender = { male: 'Мужской', female: 'Женский' } [userData.sex] || userData.sex;
                prompt += `Пол: ${gender}\n`;
            }
            return prompt;
        }

        function getChatContext() {
            const messages = [];
            const start = Math.max(0, chatHistory.length - CONTEXT_MESSAGES_COUNT * 2);
            for (let i = start; i < chatHistory.length; i++) {
                const msg = chatHistory[i];
                const role = msg.role === 'user' ? 'Пользователь' : 'Ассистент';
                messages.push(`${role}: ${msg.content}`);
            }
            return messages.join('\n');
        }

        function initAudio() {
            if (audioLoaded) return;
            try {
                typingAudio = new Audio('typing.mp3');
                typingAudio.load();
                typingAudio.volume = 0.3;
                audioLoaded = true;
            } catch (_) {
                document.addEventListener('touchstart', function retry() {
                    if (!audioLoaded) {
                        typingAudio = new Audio('typing.mp3');
                        typingAudio.load();
                        typingAudio.volume = 0.3;
                        audioLoaded = true;
                    }
                    document.removeEventListener('touchstart', retry);
                });
            }
        }

        function playTypingSound() {
            if (!audioLoaded || !typingAudio) {
                if (!audioLoaded) initAudio();
                return;
            }
            try {
                typingAudio.currentTime = 0;
                typingAudio.play().catch(() => {});
            } catch (_) {}
        }

        function isAtBottom() {
            const threshold = 20;
            return chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < threshold;
        }

        function updateScrollButton() {
            const atBottom = isAtBottom();
            if (atBottom) {
                scrollToBottomBtn.classList.remove('show');
                isAtBottomFlag = true;
            } else {
                scrollToBottomBtn.classList.add('show');
                isAtBottomFlag = false;
            }
        }

        function downloadSvgAsPng(svgElement) {
            if (!svgElement) return;
            const clone = svgElement.cloneNode(true);
            let width = parseInt(svgElement.getAttribute('width')) || parseInt(svgElement.style.width) || 800;
            let height = parseInt(svgElement.getAttribute('height')) || parseInt(svgElement.style.height) || 600;
            if (isNaN(width) || width <= 0) width = 800;
            if (isNaN(height) || height <= 0) height = 600;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const serializer = new XMLSerializer();
            let svgStr = serializer.serializeToString(clone);
            if (!svgStr.includes('xmlns')) {
                svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            if (!svgStr.includes('viewBox')) {
                svgStr = svgStr.replace('<svg', `<svg viewBox="0 0 ${width} ${height}"`);
            }

            const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const pngDataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'image.png';
                link.href = pngDataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('✅ Изображение сохранено');
            };
            img.onerror = function() {
                URL.revokeObjectURL(url);
                showToast('❌ Ошибка при сохранении');
            };
            img.src = url;
        }

        function shareSvg(svgElement) {
            if (!svgElement) return;
            const clone = svgElement.cloneNode(true);
            let width = parseInt(svgElement.getAttribute('width')) || parseInt(svgElement.style.width) || 800;
            let height = parseInt(svgElement.getAttribute('height')) || parseInt(svgElement.style.height) || 600;
            if (isNaN(width) || width <= 0) width = 800;
            if (isNaN(height) || height <= 0) height = 600;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const serializer = new XMLSerializer();
            let svgStr = serializer.serializeToString(clone);
            if (!svgStr.includes('xmlns')) {
                svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            if (!svgStr.includes('viewBox')) {
                svgStr = svgStr.replace('<svg', `<svg viewBox="0 0 ${width} ${height}"`);
            }

            const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                URL.revokeObjectURL(url);
                canvas.toBlob(function(blob) {
                    if (!blob) { showToast('❌ Ошибка при создании изображения'); return; }
                    const file = new File([blob], 'image.png', { type: 'image/png' });
                    if (navigator.share) {
                        navigator.share({ files: [file], title: 'Поделиться изображением' })
                            .then(() => showToast('✅ Поделились'))
                            .catch((err) => {
                                if (err.name !== 'AbortError') {
                                    showToast('❌ Ошибка при шеринге');
                                }
                                const link = document.createElement('a');
                                link.download = 'image.png';
                                link.href = URL.createObjectURL(blob);
                                document.body.appendChild(link);
                                link.click();
                                document.body.removeChild(link);
                            });
                    } else {
                        const link = document.createElement('a');
                        link.download = 'image.png';
                        link.href = URL.createObjectURL(blob);
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showToast('✅ Изображение сохранено');
                    }
                }, 'image/png');
            };
            img.onerror = function() {
                URL.revokeObjectURL(url);
                showToast('❌ Ошибка при создании изображения');
            };
            img.src = url;
        }

        function setupSvgContextMenu() {
            const svgImages = chatArea.querySelectorAll('.svg-image');
            svgImages.forEach(img => {
                img.removeEventListener('contextmenu', handleSvgContextMenu);
                img.addEventListener('contextmenu', handleSvgContextMenu);
                let pressTimer = null;
                img.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(() => {
                        currentSvgElement = this;
                        showSvgContextMenu(e, this);
                    }, 500);
                }, { passive: true });
                img.addEventListener('touchend', function() { clearTimeout(pressTimer); }, { passive: true });
                img.addEventListener('touchmove', function() { clearTimeout(pressTimer); }, { passive: true });
            });
        }

        function handleSvgContextMenu(e) {
            e.preventDefault();
            e.stopPropagation();
            currentSvgElement = this;
            showSvgContextMenu(e, this);
        }

        function showSvgContextMenu(e, svgElement) {
            currentSvgElement = svgElement;
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX || e.pageX;
                y = e.clientY || e.pageY;
            }
            const menuWidth = 200;
            const menuHeight = isMobile ? 60 : 100;
            if (isMobile) {
                svgShareItem.style.display = 'flex';
                svgDownloadItem.style.display = 'none';
            } else {
                svgDownloadItem.style.display = 'flex';
                svgShareItem.style.display = 'none';
            }
            if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
            if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;
            if (x < 10) x = 10;
            if (y < 10) y = 10;
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.classList.add('show');
        }

        function saveChat() { localStorage.setItem('ermakx_chat', JSON.stringify(chatHistory)); }

        function loadChat() {
            const saved = localStorage.getItem('ermakx_chat');
            chatHistory = saved ? JSON.parse(saved) : [];
            renderChat();
        }

        function renderChat() {
            chatArea.innerHTML = '';
            if (chatHistory.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'message message-ai';
                const content = document.createElement('div');
                content.className = 'content';
                content.textContent = '👋 Здравствуйте! Я AI ассистент. Чем могу помочь?';
                emptyDiv.appendChild(content);
                chatArea.appendChild(emptyDiv);
            } else {
                chatHistory.forEach((msg, index) => {
                    if (msg.role === 'user') {
                        const div = document.createElement('div');
                        div.className = 'message message-user';
                        div.textContent = msg.content;
                        div.dataset.text = msg.content;
                        div.dataset.index = index;
                        chatArea.appendChild(div);
                    } else if (msg.role === 'ai') {
                        const div = document.createElement('div');
                        div.className = 'message message-ai';
                        const content = document.createElement('div');
                        content.className = 'content';
                        content.innerHTML = parseMarkdown(msg.content);
                        div.appendChild(content);
                        div.dataset.text = msg.content;
                        div.dataset.index = index;
                        chatArea.appendChild(div);
                    }
                });
                setTimeout(setupSvgContextMenu, 50);
            }
            chatArea.scrollTop = chatArea.scrollHeight;
            attachLongPress();
            updateScrollButton();
        }

        function attachLongPress() {
            const messages = chatArea.querySelectorAll('.message');
            let pressTimer = null;
            let isPressed = false;
            messages.forEach(msg => {
                const startPress = (e) => {
                    isPressed = true;
                    pressTimer = setTimeout(() => {
                        if (isPressed) {
                            const text = msg.dataset.text || msg.textContent || '';
                            showTextContextMenu(e, text);
                            isPressed = false;
                        }
                    }, 500);
                };
                const endPress = () => {
                    isPressed = false;
                    if (pressTimer) { clearTimeout(pressTimer);
                        pressTimer = null; }
                };
                msg.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const text = msg.dataset.text || msg.textContent || '';
                    showTextContextMenu(e, text);
                });
                msg.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) startPress(e);
                }, { passive: true });
                msg.addEventListener('touchend', endPress, { passive: true });
                msg.addEventListener('touchmove', endPress, { passive: true });
            });
        }

        function showTextContextMenu(e, text) {
            contextTargetText = text;
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX || e.pageX;
                y = e.clientY || e.pageY;
            }
            svgDownloadItem.style.display = 'none';
            svgShareItem.style.display = 'none';
            const menuWidth = 180;
            const menuHeight = 50;
            if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
            if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;
            if (x < 10) x = 10;
            if (y < 10) y = 10;
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.classList.add('show');
        }

        copyMenuItem.addEventListener('click', (e) => {
            e.stopPropagation();
            if (contextTargetText) {
                navigator.clipboard.writeText(contextTargetText).catch(() => fallbackCopy(contextTargetText));
            }
            contextMenu.classList.remove('show');
        });

        svgDownloadItem.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentSvgElement) downloadSvgAsPng(currentSvgElement);
            contextMenu.classList.remove('show');
        });

        svgShareItem.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentSvgElement) shareSvg(currentSvgElement);
            contextMenu.classList.remove('show');
        });

        document.addEventListener('click', () => contextMenu.classList.remove('show'));

        function showLoadingBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'loading-bubble show';
            bubble.id = 'loadingBubble';

                </span>

            updateScrollButton();
            return bubble;
        }

        function removeLoadingBubble() {
            const bubble = document.getElementById('loadingBubble');
            if (bubble) bubble.remove();
        }

        function explodeParticles(element) {
            const rect = element.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const colors = ['#00AE00', '#00CC00', '#33CC33', '#009900', '#00AA00', '#66DD66', '#00FF00'];
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = Math.random() * 2 * Math.PI;
                const dist = 80 + Math.random() * 300;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist - 50 + 'px');
                p.style.left = (cx + (Math.random() - 0.5) * 20) + 'px';
                p.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = (4 + Math.random() * 6) + 'px';
                p.style.height = p.style.width;
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 900);
            }
        }

        async function fetchAgents() {
            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getDatabase`);
                const data = await resp.json();
                if (data.success && data.data && data.data.agents) {
                    agents = data.data.agents;
                    return true;
                }
                return false;
            } catch (_) { return false; }
        }

        function renderAgentDropdown() {
            agentDropdown.innerHTML = '';
            agents.forEach((agent, idx) => {
                const div = document.createElement('div');
                div.className = 'agent-option';
                div.textContent = agent.name;
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedAgentIndex = idx;
                    selectedAgentNameSpan.textContent = agents[selectedAgentIndex].name;
                    localStorage.setItem('ermakx_selected_agent', selectedAgentIndex);
                    agentDropdown.classList.remove('show');
                });
                agentDropdown.appendChild(div);
            });
        }

        function initAgentSelector() {
            const savedIdx = localStorage.getItem('ermakx_selected_agent');
            if (savedIdx && agents[parseInt(savedIdx)]) selectedAgentIndex = parseInt(savedIdx);
            else selectedAgentIndex = 0;
            if (agents.length) selectedAgentNameSpan.textContent = agents[selectedAgentIndex].name;
            renderAgentDropdown();
            agentBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                agentDropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => agentDropdown.classList.remove('show'));
        }

        function updateSendButtonState() {
            const text = messageInput.value.trim();
            if (text.length > 0 && !isWaiting) {
                sendBtn.classList.add('active');
            } else if (!isWaiting) {
                sendBtn.classList.remove('active');
            }
        }

        function updateCharCounter() {
            const len = messageInput.value.length;
            charCounter.textContent = `${len}/${MAX_MESSAGE_LENGTH}`;
            if (len > MAX_MESSAGE_LENGTH * 0.85) {
                charCounter.classList.add('warning');
            } else {
                charCounter.classList.remove('warning');
            }
        }

        function stopGeneration() {
            isStopRequested = true;
            if (typingInterval) { clearTimeout(typingInterval);
                typingInterval = null; }
            isWaiting = false;
            isGenerating = false;
            sendBtn.classList.remove('stop-btn');
            sendBtn.classList.add('active');
            sendBtn.querySelector('.arrow-icon').style.display = 'flex';
            removeLoadingBubble();
            updateSendButtonState();
        }

        async function sendContextToAI(message) {
            const agent = agents[selectedAgentIndex];
            if (!agent) return "Агент не найден. Попробуйте выбрать другого.";

            try {
                const userPrompt = getUserPrompt();
                const chatContext = getChatContext();
                let fullMessage = message;

                let contextParts = [];
                if (userPrompt) contextParts.push(`[Контекст пользователя:\n${userPrompt}]`);
                if (chatContext) contextParts.push(`[История диалога (последние ${CONTEXT_MESSAGES_COUNT} сообщений):\n${chatContext}]`);
                contextParts.push(`[Вопрос пользователя:\n${message}]`);

                fullMessage = contextParts.join('\n\n');

                const sessionId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const totalParts = Math.ceil(fullMessage.length / CHUNK_SIZE);

                for (let i = 0; i < totalParts; i++) {
                    const chunk = fullMessage.substr(i * CHUNK_SIZE, CHUNK_SIZE);
                    const url = `${SCRIPT_URL}?action=sendContextPart&sessionId=${sessionId}&part=${i + 1}&total=${totalParts}&data=${encodeURIComponent(chunk)}`;
                    const resp = await fetch(url);
                    if (!resp.ok) {
                        throw new Error(`HTTP ${resp.status}`);
                    }
                    const data = await resp.json();
                    if (!data.success) {
                        throw new Error(data.error || 'Ошибка отправки части');
                    }
                }

                const finalUrl =
                    `${SCRIPT_URL}?action=finalizeContext&sessionId=${sessionId}&agent=${encodeURIComponent(agent.name)}&message=${encodeURIComponent(fullMessage)}`;
                const finalResp = await fetch(finalUrl);
                if (!finalResp.ok) {
                    throw new Error(`HTTP ${finalResp.status}`);
                }
                const finalData = await finalResp.json();

                return finalData.success ? finalData.response : "Я сейчас немного занят, но вы можете переключиться на другого агента.";

            } catch (error) {
                console.error('Error:', error);
                return "Я сейчас немного занят, но вы можете переключиться на другого агента.";
            }
        }

        function hasInstantContent(text) {
            return text.includes('|') ||
                text.includes('```') ||
                (text.includes('<svg') || text.includes('svg'));
        }

        function typeMessageWithInstantBlocks(element, fullText, callback) {
            const content = element.querySelector('.content');
            if (!content) return;

            const fullHtml = parseMarkdown(fullText);
            const blocks = extractBlocks(fullText);

            let currentBlockIndex = 0;
            let charIndex = 0;
            let htmlBuffer = '';
            let isStop = false;

            function typeNext() {
                if (isStopRequested || isStop) {
                    content.innerHTML = fullHtml;
                    setTimeout(setupSvgContextMenu, 50);
                    isGenerating = false;
                    if (callback) callback();
                    return;
                }

                if (currentBlockIndex < blocks.length) {
                    const block = blocks[currentBlockIndex];

                    if (block.type === 'instant') {
                        htmlBuffer += block.content;
                        currentBlockIndex++;
                        try {
                            content.innerHTML = parseMarkdown(htmlBuffer);
                        } catch (_) {
                            content.textContent = htmlBuffer;
                        }
                        if (isAtBottomFlag || !isUserScrolling) {
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        updateScrollButton();
                        setTimeout(typeNext, 20);
                        return;
                    }

                    if (charIndex < block.content.length) {
                        const char = block.content[charIndex];
                        htmlBuffer += char;
                        charIndex++;

                        try {
                            content.innerHTML = parseMarkdown(htmlBuffer);
                        } catch (_) {
                            content.textContent = htmlBuffer;
                        }

                        if (char !== ' ' && char !== '\n') {
                            playTypingSound();
                        }

                        if (isAtBottomFlag || !isUserScrolling) {
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        updateScrollButton();

                        const delay = char === '\n' ? 100 : (char === '.' || char === ',' || char === '!' || char === '?') ?
                            30 : 8;
                        typingInterval = setTimeout(typeNext, delay);
                    } else {
                        currentBlockIndex++;
                        charIndex = 0;
                        setTimeout(typeNext, 10);
                    }
                } else {
                    content.innerHTML = fullHtml;
                    setTimeout(setupSvgContextMenu, 50);
                    isGenerating = false;
                    if (callback) callback();
                    updateScrollButton();
                }
            }

            typeNext();
        }

        function extractBlocks(text) {
            const blocks = [];
            let i = 0;
            let currentText = '';

            function flushText() {
                if (currentText.trim()) {
                    blocks.push({ type: 'text', content: currentText });
                    currentText = '';
                }
            }

            while (i < text.length) {
                if (text.substring(i, i + 3) === '```') {
                    flushText();
                    const start = i;
                    let end = text.indexOf('```', i + 3);
                    if (end === -1) end = text.length;
                    else end += 3;
                    blocks.push({ type: 'instant', content: text.substring(start, end) });
                    i = end;
                    continue;
                }

                if (text[i] === '|' && (i === 0 || text[i - 1] === '\n')) {
                    flushText();
                    let start = i;
                    let end = i;
                    let lineCount = 0;
                    let j = i;
                    let tableStart = j;
                    let hasHeaderSep = false;
                    let lines = [];

                    while (j < text.length) {
                        let lineEnd = text.indexOf('\n', j);
                        if (lineEnd === -1) lineEnd = text.length;
                        let line = text.substring(j, lineEnd).trim();
                        if (line.startsWith('|') && line.endsWith('|')) {
                            lines.push(line);
                            if (line.match(/^\|[\s\-:|]+\|$/)) {
                                hasHeaderSep = true;
                            }
                            j = lineEnd + 1;
                            if (j >= text.length || !(text.substring(j).trim().startsWith('|'))) {
                                break;
                            }
                        } else {
                            break;
                        }
                    }

                    if (lines.length >= 2 && hasHeaderSep) {
                        let tableText = lines.join('\n');
                        blocks.push({ type: 'instant', content: tableText });
                        i = j;
                        continue;
                    } else {
                        currentText += text[i];
                        i++;
                        continue;
                    }
                }

                currentText += text[i];
                i++;
            }

            flushText();
            return blocks;
        }

        async function sendMessage() {
            if (isWaiting) {
                stopGeneration();
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            if (text.length > MAX_MESSAGE_LENGTH) {
                showToast(`❌ Превышен лимит в ${MAX_MESSAGE_LENGTH} символов`);
                return;
            }
            playTypingSound();

            messageInput.value = '';
            messageInput.style.height = 'auto';
            updateSendButtonState();
            updateCharCounter();

            chatHistory.push({ role: 'user', content: text });
            saveChat();
            renderChat();

            isWaiting = true;
            isStopRequested = false;
            isGenerating = true;
            sendBtn.classList.add('stop-btn');
            sendBtn.classList.remove('active');
            sendBtn.querySelector('.arrow-icon').style.display = 'none';

            const bubble = showLoadingBubble();

            try {
                const aiResponse = await sendContextToAI(text);
                if (isStopRequested) {
                    removeLoadingBubble();
                    isWaiting = false;
                    isGenerating = false;
                    sendBtn.classList.remove('stop-btn');
                    sendBtn.classList.add('active');
                    sendBtn.querySelector('.arrow-icon').style.display = 'flex';
                    updateSendButtonState();
                    return;
                }
                removeLoadingBubble();
                if (bubble) explodeParticles(bubble);

                const aiDiv = document.createElement('div');
                aiDiv.className = 'message message-ai';
                const content = document.createElement('div');
                content.className = 'content';
                aiDiv.appendChild(content);
                aiDiv.dataset.text = aiResponse;
                chatArea.appendChild(aiDiv);
                chatArea.scrollTop = chatArea.scrollHeight;

                await new Promise((resolve) => {
                    typeMessageWithInstantBlocks(aiDiv, aiResponse, () => {
                        chatHistory.push({ role: 'ai', content: aiResponse });
                        saveChat();
                        resolve();
                    });
                });

                setupSvgContextMenu();
                attachLongPress();

            } catch (_) {
                removeLoadingBubble();
                const errDiv = document.createElement('div');
                errDiv.className = 'message message-ai';
                const c = document.createElement('div');
                c.className = 'content';
                c.textContent = 'Я сейчас немного занят, но вы можете переключиться на другого агента.';
                errDiv.appendChild(c);
                chatArea.appendChild(errDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            isWaiting = false;
            isGenerating = false;
            sendBtn.classList.remove('stop-btn');
            sendBtn.classList.add('active');
            sendBtn.querySelector('.arrow-icon').style.display = 'flex';
            updateSendButtonState();
            updateScrollButton();
        }

        function clearHistory() { modalOverlay.classList.add('show'); }

        function confirmClear() {
            chatHistory = [];
            saveChat();
            renderChat();
            modalOverlay.classList.remove('show');
            showToast('🗑 История очищена');
        }

        async function init() {
            checkMobile();
            loadAppSettings();
            loadUserData();
            initAudio();
            loadChat();

            const agentsLoaded = await fetchAgents();
            if (!agentsLoaded || agents.length === 0) {
                agents = [{ name: 'Базовый AI' }];
            }
            initAgentSelector();

            sendBtn.addEventListener('click', sendMessage);
            clearBtn.addEventListener('click', clearHistory);
            modalConfirm.addEventListener('click', confirmClear);
            modalCancel.addEventListener('click', () => modalOverlay.classList.remove('show'));
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) modalOverlay.classList.remove('show');
            });

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                if (this.value.length > MAX_MESSAGE_LENGTH) {
                    this.value = this.value.substr(0, MAX_MESSAGE_LENGTH);
                }
                playTypingSound();
                updateSendButtonState();
                updateCharCounter();
            });

            closeBtn.addEventListener('click', () => { window.location.href = 'index.html'; });

            chatArea.addEventListener('scroll', () => {
                const isScrollingUp = chatArea.scrollTop < lastScrollTop;
                lastScrollTop = chatArea.scrollTop;
                if (isScrollingUp && isGenerating) isUserScrolling = true;
                updateScrollButton();
                if (isAtBottom()) {
                    isUserScrolling = false;
                    isAtBottomFlag = true;
                } else {
                    isAtBottomFlag = false;
                }
                if (scrollTimeout) clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    if (isAtBottom()) {
                        isUserScrolling = false;
                        isAtBottomFlag = true;
                    }
                    updateScrollButton();
                }, 300);
            });

            scrollToBottomBtn.addEventListener('click', () => {
                chatArea.scrollTop = chatArea.scrollHeight;
                isUserScrolling = false;
                isAtBottomFlag = true;
                updateScrollButton();
            });

            document.addEventListener('touchstart', function initOnTouch() {
                if (!audioLoaded) initAudio();
                document.removeEventListener('touchstart', initOnTouch);
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'ermakx_user') loadUserData();
            });
            window.addEventListener('resize', checkMobile);

            updateSendButtonState();
            updateCharCounter();
            setTimeout(attachLongPress, 500);
            setTimeout(setupSvgContextMenu, 100);
        }

        if (typeof marked === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
            script.onload = init;
            document.head.appendChild(script);
        } else {
            init();
        }
    </script>
</body>
